title: Hack0Guide
description: The ultimate unified console modding archive and custom firmware resource.
url: "https://eu.org"
baseurl: ""

# Markdown settings
markdown: kramdown
highlighter: rouge

# Exclude repository development metadata from being compiled into the live site
exclude:
  - .github/
  - .gitignore
  - LICENSE
  - README.md
  - Credits.txt

# Keep special files visible to browsers
include:
  - CNAME
  - robots.txt
  - sitemap.xml
